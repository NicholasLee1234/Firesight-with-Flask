<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FireSight – Dual Thermal Cameras</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div id="header">
    <h1>FireSight Rescue Interface</h1>
</div>

<nav>
    <a href="{{ url_for('index') }}" class="nav_button">OVERVIEW</a>
    <a href="{{ url_for('health_stats') }}" class="nav_button">HEALTH STATS</a>
    <a href="{{ url_for('thermal') }}" class="nav_button selected">THERMAL IMAGING</a>
    <a href="{{ url_for('slam_map') }}" class="nav_button">LIDAR & SLAM MAP</a>
</nav>

<div class="tab">
    <div class="heading">
        <h2>THERMAL IMAGING (Dual Cameras)</h2>
    </div>

    <div class="row">

        <!-- CAMERA 1 -->
        <div class="thermal_cam">
            <h3>Camera 0 Feed</h3>
            <img src="{{ url_for('video_feed_cam0') }}" width="480" height="360">
            <div class="card">
                <div class="status_alert" id="statusBox0"></div>
                <p id="statusText0">Checking...</p>
            </div>
        </div>

        <!-- CAMERA 1 -->
        <div class="thermal_cam">
            <h3>Camera 1 Feed</h3>
            <img src="{{ url_for('video_feed_cam1') }}" width="480" height="360">
            <div class="card">
                <div class="status_alert" id="statusBox1"></div>
                <p id="statusText1">Checking...</p>
            </div>
        </div>

    </div>
</div>

<script>
function checkStatus(cam, url) {
    fetch(url)
        .then(response => response.json())
        .then(data => {
            const box = document.getElementById(`statusBox${cam}`);
            const text = document.getElementById(`statusText${cam}`);

            if (data.person === 1) {
                box.style.backgroundColor = "green";
                text.innerText = "Person Detected";
            } else {
                box.style.backgroundColor = "red";
                text.innerText = "No Person Detected";
            }
        });
}

// Update both every 1s
setInterval(() => {
    checkStatus(0, "/detection_status_cam0");
    checkStatus(1, "/detection_status_cam1");
}, 1000);
</script>

</body>
</html>
